name: Build extension package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build XPI package
        shell: pwsh
        run: ./scripts/build-xpi.ps1

      - name: Upload packaged XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-site-image-blocker-xpi
          path: dist/*.xpi
